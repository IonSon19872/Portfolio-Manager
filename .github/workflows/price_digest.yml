name: Price Digest (07:45 CET)

on:
  schedule:
    - cron: '45 6 * * 1-5'   # 07:45 CET (UTC+1), Mon–Fri
    # Summer CEST (UTC+2): change to '45 5 * * 1-5'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  price-digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: Run price digest (email + snapshot)
        env:
          EMAIL_FROM:      ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD:  ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO:        ${{ secrets.EMAIL_TO }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          DIGEST_MODE:     "full"     # send full portfolio digest email
        run: python scripts/price_digest.py

      - name: Commit snapshot
        run: |
          git config user.name  "Portfolio Bot"
          git config user.email "portfolio-bot@users.noreply.github.com"
          git add docs/data/ portfolio_config.json
          git diff --staged --quiet || git commit -m "📊 Price digest $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
