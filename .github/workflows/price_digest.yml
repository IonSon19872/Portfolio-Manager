name: Price Digest (08:15 CET)
on:
  schedule:
    - cron: '09 7 * * 1-5'   # 08:09 CET (UTC+1)
    # Summer CEST (UTC+2): change to '15 6 * * 1-5'
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  price-digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install requests yfinance mstarpy
      - name: Run price digest
        env:
          EMAIL_FROM:     ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO:       ${{ secrets.EMAIL_TO }}
          DIGEST_MODE:    "full"
        run: python scripts/price_digest.py
      - name: Commit snapshot
        run: |
          git config user.name  "Portfolio Bot"
          git config user.email "portfolio-bot@users.noreply.github.com"
          git add docs/data/ portfolio_config.json
          git diff --staged --quiet || git commit -m "[DIGEST] Price digest $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
