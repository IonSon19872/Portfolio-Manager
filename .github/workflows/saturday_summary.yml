name: Saturday Weekly Summary

on:
  schedule:
    - cron: '0 9 * * 6'   # 10:00 CET (UTC+1), Saturday
                           # Summer CEST (UTC+2): change to '0 8 * * 6'
  workflow_dispatch: {}    # manual trigger anytime

permissions:
  contents: write

jobs:
  saturday-summary:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Saturday summary
        env:
          EMAIL_FROM:        ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD:    ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO:          ${{ secrets.EMAIL_TO }}
          FINNHUB_API_KEY:   ${{ secrets.FINNHUB_API_KEY }}
        run: python scripts/saturday_summary.py

      - name: Commit updated alerts log
        run: |
          git config user.name  "Portfolio Bot"
          git config user.email "portfolio-bot@users.noreply.github.com"
          git add docs/data/alerts.json
          git diff --staged --quiet || git commit -m "📅 Saturday summary $(date -u '+%Y-%m-%d')"
          git push
