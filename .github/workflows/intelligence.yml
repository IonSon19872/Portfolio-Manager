name: Intelligence Check (Ratings)

on:
  schedule:
    - cron: '30 7  * * 1-5'  # 08:30 CET (UTC+1), Mon–Fri
    - cron: '0  16 * * 1-5'  # 17:00 CET
    # Summer CEST (UTC+2): '30 6' and '0 15'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  intelligence:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: Run intelligence check (ratings + news email)
        env:
          EMAIL_FROM:      ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD:  ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO:        ${{ secrets.EMAIL_TO }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: python scripts/intelligence.py

      - name: Commit intelligence data
        run: |
          git config user.name  "Portfolio Bot"
          git config user.email "portfolio-bot@users.noreply.github.com"
          git add docs/data/
          git diff --staged --quiet || git commit -m "🧠 Intelligence $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
