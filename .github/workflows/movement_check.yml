name: Movement + Analyst Alerts
on:
  schedule:
    - cron: '41 7 * * 1-5'   # 08:45 CET (UTC+1)
    - cron: '19 10 * * 1-5'   # 11:00 CET
    - cron: '11 12 * * 1-5'   # 13:00 CET
    - cron: '41 14 * * 1-5'  # 15:45 CET
    - cron: '23 16 * * 1-5'   # 17:00 CET
    # Summer CEST (UTC+2): subtract 1 hour from each
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  movement-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install requests yfinance mstarpy
      - name: Run movement + analyst check
        env:
          EMAIL_FROM:     ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO:       ${{ secrets.EMAIL_TO }}
          DIGEST_MODE:    "movement"
        run: python scripts/price_digest.py
      - name: Commit snapshot
        run: |
          git config user.name  "Portfolio Bot"
          git config user.email "portfolio-bot@users.noreply.github.com"
          git add docs/data/ portfolio_config.json
          git diff --staged --quiet || git commit -m "[MOVE] Movement check $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
