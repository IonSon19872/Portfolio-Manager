name: Movement & News Check (4x daily)

on:
  schedule:
    - cron: '30 7  * * 1-5'  # 08:30 CET (UTC+1), Mon-Fri
    - cron: '0  11 * * 1-5'  # 12:00 CET
    - cron: '15 14 * * 1-5'  # 15:15 CET
    - cron: '0  16 * * 1-5'  # 17:00 CET
    # Summer CEST (UTC+2): subtract 1h -> '30 6', '0 10', '15 13', '0 15'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  movement-and-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install requests yfinance

      - name: Run movement check
        env:
          EMAIL_FROM:      ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD:  ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO:        ${{ secrets.EMAIL_TO }}
          DIGEST_MODE:     "movement"  # alerts only, no full digest email
        run: python scripts/price_digest.py

      - name: Run news & ratings check
        env:
          EMAIL_FROM:      ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD:  ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO:        ${{ secrets.EMAIL_TO }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: python scripts/intelligence.py

      - name: Commit updated data
        run: |
          git config user.name  "Portfolio Bot"
          git config user.email "portfolio-bot@users.noreply.github.com"
          git add docs/data/ portfolio_config.json
          git diff --staged --quiet || git commit -m "[ALERT] Movement+News $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
